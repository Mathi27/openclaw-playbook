site_name: Learn Openclaw
site_description: Learn to build OpenClaw agents step by step
site_author: Mathi

theme:
  name: material
  palette:
    primary: black

  features:
    - navigation.instant
    - navigation.expand
    - navigation.tabs
    - toc.follow
    - header.autohide
    - announce.dismiss
    - navigation.footer
    - content.code.copy
    - content.code.annotate
 
  logo: assets/openclaw-logo.png
  favicon: assets/openclaw-logo.png


  font:
    text: Roboto
copyright: "Learn Openclaw | KGiSL Educational Institutions | Curated By Mathi Yuvarjan & Aiswariya "

